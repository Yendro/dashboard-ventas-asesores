<script>
  const coloresDashboard = [
    "#eb6c61",
    "#f0a39e",
    "#cf5d53",
    "#e0847b",
    "#b54b42",
  ];

  // Utilidad para formatear números a moneda (MXN)
  const formateadorMoneda = new Intl.NumberFormat("es-MX", {
    style: "currency",
    currency: "MXN",
    maximumFractionDigits: 0,
  });

  // Variables globales
  let myCharts = [];
  let chartVentasMeses,
    chartMarcas,
    chartDesarrollo,
    chartArbol,
    chartTuberiaEstatus;
  let gridJsInstance = null;

  document.addEventListener("DOMContentLoaded", () => {
    // 1. NAVEGACIÓN Y EVENT LISTENERS
    const btnDashboard = document.getElementById("btn-dashboard");
    const btnTabla = document.getElementById("btn-tabla");
    const vistaDashboard = document.getElementById("vista-dashboard");
    const vistaTabla = document.getElementById("vista-tabla");

    btnDashboard.addEventListener("click", () => {
      vistaDashboard.classList.remove("oculto");
      vistaTabla.classList.add("oculto");
      btnDashboard.classList.add("activo");
      btnTabla.classList.remove("activo");
      myCharts.forEach((chart) => chart.resize());
    });

    btnTabla.addEventListener("click", () => {
      vistaTabla.classList.remove("oculto");
      vistaDashboard.classList.add("oculto");
      btnTabla.classList.add("activo");
      btnDashboard.classList.remove("activo");

      if (!gridJsInstance) {
        renderizarTablaGridJs();
      }
    });

    document
      .getElementById("fecha-inicio")
      .addEventListener("change", renderizarDashboard);
    document
      .getElementById("fecha-fin")
      .addEventListener("change", renderizarDashboard);

    // 2. PETICIÓN ASÍNCRONA AL BACKEND
    google.script.run
      .withSuccessHandler((respuesta) => {
        if (respuesta.error) {
          document.getElementById("pantalla-carga").classList.add("oculto");
          document.getElementById("pantalla-error").classList.remove("oculto");
          document.getElementById("mensaje-error").innerText = respuesta.error;
          return;
        }

        DATOS_DESGLOSADOS = respuesta.datos;
        document.getElementById("nombre-asesor").innerText = respuesta.asesor;

        document.getElementById("pantalla-carga").classList.add("oculto");
        document.getElementById("app-container").classList.remove("oculto");

        inicializarGraficos();
        renderizarDashboard();
      })
      .withFailureHandler((error) => {
        console.error("Error en petición:", error);
        document.getElementById("pantalla-carga").classList.add("oculto");
        document.getElementById("pantalla-error").classList.remove("oculto");
        document.getElementById("mensaje-error").innerText =
          "Fallo de conexión con el servidor.";
      })
      .obtenerDatosAsesor(TOKEN_URL);
  });

  // 3. INICIALIZACIÓN DE GRÁFICOS
  function inicializarGraficos() {
    chartVentasMeses = echarts.init(
      document.getElementById("chart-ventas-meses"),
    );
    chartArbol = echarts.init(document.getElementById("chart-arbol"));
    chartDesarrollo = echarts.init(document.getElementById("chart-desarrollo"));
    chartMarcas = echarts.init(document.getElementById("chart-marcas"));
    chartTuberiaEstatus = echarts.init(
      document.getElementById("chart-tuberia-estatus"),
    );

    myCharts.push(
      chartVentasMeses,
      chartArbol,
      chartDesarrollo,
      chartMarcas,
      chartTuberiaEstatus,
    );

    window.addEventListener("resize", () => {
      myCharts.forEach((chart) => chart.resize());
    });
  }

  // 4. PROCESAMIENTO Y RENDERIZADO DEL DASHBOARD
  function renderizarDashboard() {
    const fInicio = document.getElementById("fecha-inicio").value;
    const fFin = document.getElementById("fecha-fin").value;

    let kpi = { ventas: 0, unidades: 0, tuberia: 0, tuberiaUnidades: 0 };
    let resumen = {
      ventasPorMes: {},
      ventasPorMarca: {},
      ventasPorDesarrollo: {},
      arbol: {},
      tuberiaEstatus: {},
    };

    const mesesOrden = [
      "ene",
      "feb",
      "mar",
      "abr",
      "may",
      "jun",
      "jul",
      "ago",
      "sep",
      "oct",
      "nov",
      "dic",
    ];
    mesesOrden.forEach((m) => (resumen.ventasPorMes[m] = 0));

    // Filtrar primero el arreglo maestro
    const datosFiltrados = DATOS_DESGLOSADOS.filter((fila) => {
      // CORRECCIÓN 1: Detección flexible de estatus (Captura Finalizado, Finalizadas, Finalizada Y Liquidada, etc)
      const estatusTexto = String(
        fila.EstatusVenta || fila.Estatus || "",
      ).toUpperCase();
      const esFinalizado =
        fila.Estatus === 7 ||
        fila.Estatus === 8 ||
        estatusTexto.includes("FINALIZAD");

      const fechaString = esFinalizado
        ? fila.FechaFinalizado || fila.FechaProceso
        : fila.FechaProceso;
      if (!fechaString) return false;

      const fechaFila = String(fechaString).substring(0, 10);

      if (fInicio && fechaFila < fInicio) return false;
      if (fFin && fechaFila > fFin) return false;
      return true;
    });

    // Iterar sobre los datos ya filtrados
    datosFiltrados.forEach((fila) => {
      const precio = Number(fila.PrecioVenta) || 0;
      const unidades = Number(fila.Unidades || fila.M2 || 1);
      const marca = fila.Marca || "Sin Marca";
      const desarrollo = fila.Desarrollo || "Sin Desarrollo";
      const estatusNombre = fila.EstatusVenta || fila.Estatus || "En Proceso";

      const estatusTexto = String(
        fila.EstatusVenta || fila.Estatus || "",
      ).toUpperCase();
      const esFinalizado =
        fila.Estatus === 7 ||
        fila.Estatus === 8 ||
        estatusTexto.includes("FINALIZAD");

      const fechaString = esFinalizado
        ? fila.FechaFinalizado || fila.FechaProceso
        : fila.FechaProceso;
      const fechaObj = new Date(fechaString);
      const mesCorto = fechaObj
        .toLocaleString("es-ES", { month: "short", timeZone: "UTC" })
        .toLowerCase()
        .replace(".", "");

      if (esFinalizado) {
        kpi.ventas += precio;
        kpi.unidades += unidades;
        if (resumen.ventasPorMes[mesCorto] !== undefined)
          resumen.ventasPorMes[mesCorto] += precio;
        resumen.ventasPorMarca[marca] =
          (resumen.ventasPorMarca[marca] || 0) + precio;
        resumen.ventasPorDesarrollo[desarrollo] =
          (resumen.ventasPorDesarrollo[desarrollo] || 0) + precio;

        if (!resumen.arbol[marca])
          resumen.arbol[marca] = { total: 0, desarrollos: {} };
        resumen.arbol[marca].total += precio;
        resumen.arbol[marca].desarrollos[desarrollo] =
          (resumen.arbol[marca].desarrollos[desarrollo] || 0) + precio;
      } else {
        kpi.tuberia += precio;
        kpi.tuberiaUnidades += unidades;
        resumen.tuberiaEstatus[estatusNombre] =
          (resumen.tuberiaEstatus[estatusNombre] || 0) + precio;
      }
    });

    document.getElementById("kpi-ventas").innerText = formateadorMoneda.format(
      kpi.ventas,
    );
    document.getElementById("kpi-unidades").innerText =
      kpi.unidades.toLocaleString("es-MX");
    document.getElementById("kpi-tuberia-val").innerText =
      formateadorMoneda.format(kpi.tuberia);
    document.getElementById("kpi-tuberia-unidades").innerText =
      kpi.tuberiaUnidades.toLocaleString("es-MX");

    const ventasMesesData = mesesOrden.map((m) => resumen.ventasPorMes[m]);
    const marcasData = Object.keys(resumen.ventasPorMarca)
      .map((k) => ({ name: k, value: resumen.ventasPorMarca[k] }))
      .filter((i) => i.value > 0);
    const desarrolloData = Object.keys(resumen.ventasPorDesarrollo)
      .map((k) => ({ name: k, value: resumen.ventasPorDesarrollo[k] }))
      .filter((i) => i.value > 0)
      .sort((a, b) => a.value - b.value);

    const estatusData = Object.keys(resumen.tuberiaEstatus)
      .map((k) => ({ name: k, value: resumen.tuberiaEstatus[k] }))
      .filter((i) => i.value > 0);

    const treeData = {
      name: "Ventas",
      children: Object.keys(resumen.arbol).map((marca) => ({
        name: marca,
        value: resumen.arbol[marca].total,
        children: Object.keys(resumen.arbol[marca].desarrollos).map((des) => ({
          name: des,
          value: resumen.arbol[marca].desarrollos[des],
        })),
      })),
    };

    // CORRECCIÓN 2: Optimización de paddings (grid) para llenar tarjetas
    chartVentasMeses.setOption(
      {
        color: coloresDashboard,
        tooltip: {
          trigger: "axis",
          formatter: (p) =>
            `${p[0].name}: ${formateadorMoneda.format(p[0].value)}`,
        },
        grid: { top: 10, right: 0, bottom: 0, left: 0, containLabel: true },
        xAxis: {
          type: "category",
          data: mesesOrden,
          axisLabel: { color: "#a0a0a0" },
          axisLine: { show: false },
          axisTick: { show: false },
        },
        yAxis: {
          type: "value",
          splitLine: { show: false },
          axisLabel: { show: false },
        },
        series: [{ data: ventasMesesData, type: "bar", barWidth: "70%" }],
      },
      true,
    );

    chartMarcas.setOption(
      {
        color: coloresDashboard,
        tooltip: {
          trigger: "item",
          formatter: (p) =>
            `${p.name}: ${formateadorMoneda.format(p.value)}<br/>(${p.percent}%)`,
        },
        series: [
          {
            type: "pie",
            radius: "85%",
            center: ["50%", "50%"],
            label: { color: "#fff", formatter: "{b}\n{d}%" },
            data: marcasData,
          },
        ],
      },
      true,
    );

    chartDesarrollo.setOption(
      {
        color: coloresDashboard,
        tooltip: {
          trigger: "axis",
          axisPointer: { type: "shadow" },
          formatter: (p) =>
            `${p[0].name}: ${formateadorMoneda.format(p[0].value)}`,
        },
        grid: { top: 10, right: 15, bottom: 0, left: 0, containLabel: true },
        xAxis: {
          type: "value",
          splitLine: { show: false },
          axisLabel: { show: false },
        },
        yAxis: {
          type: "category",
          data: desarrolloData.map((d) => d.name),
          axisLabel: {
            color: "#a0a0a0",
            formatter: (v) => (v.length > 12 ? v.substring(0, 12) + "..." : v),
          },
          axisLine: { show: false },
          axisTick: { show: false },
        },
        series: [
          {
            type: "bar",
            data: desarrolloData.map((d) => d.value),
            label: { show: false },
          },
        ],
      },
      true,
    );

    chartArbol.setOption(
      {
        tooltip: {
          trigger: "item",
          triggerOn: "mousemove",
          formatter: (p) =>
            `${p.data.name}: ${formateadorMoneda.format(p.data.value)}`,
        },
        series: [
          {
            type: "tree",
            data: [treeData],
            top: "0%",
            bottom: "0%",
            left: "10%",
            right: "20%", // Más ancho
            symbolSize: 8,
            itemStyle: { color: "#eb6c61", borderColor: "#eb6c61" },
            label: {
              position: "left",
              verticalAlign: "middle",
              align: "right",
              color: "#fff",
              fontSize: 11,
            },
            leaves: {
              label: {
                position: "right",
                verticalAlign: "middle",
                align: "left",
                color: "#a0a0a0",
              },
            },
            expandAndCollapse: true,
            animationDuration: 550,
            animationDurationUpdate: 750,
          },
        ],
      },
      true,
    );

    chartTuberiaEstatus.setOption(
      {
        color: coloresDashboard,
        tooltip: {
          formatter: (p) => `${p.name}: ${formateadorMoneda.format(p.value)}`,
        },
        series: [
          {
            type: "treemap",
            data: estatusData,
            top: 10,
            bottom: 0,
            left: 0,
            right: 0, // Fuerza al Treemap a tocar los bordes
            roam: false,
            nodeClick: false,
            breadcrumb: { show: false },
            label: { show: true, formatter: "{b}\n{c}", color: "#fff" },
            itemStyle: { borderColor: "#2b2b2b", borderWidth: 2 },
          },
        ],
      },
      true,
    );
  }

  // CORRECCIÓN 3: Reestructuración de Grid.js con Array plano para evitar errores de renderizado
  function renderizarTablaGridJs() {
    // Mapeamos los objetos de forma segura a un arreglo simple
    const datosTabla = DATOS_DESGLOSADOS.map((fila) => [
      fila.Marca || "Sin Marca",
      fila.Desarrollo || "Sin Desarrollo",
      fila.Unidad || "N/A",
      fila.Cliente || "Sin Cliente",
      Number(fila.PrecioVenta) || 0,
      fila.EstatusVenta || fila.Estatus || "Sin Estatus",
      fila.FechaProceso || fila.FechaFinalizado || "Sin Fecha",
    ]);

    gridJsInstance = new gridjs.Grid({
      columns: [
        "Marca",
        "Desarrollo",
        "Unidad",
        "Cliente",
        {
          name: "Precio",
          formatter: (cell) => formateadorMoneda.format(cell),
        },
        "Estatus",
        {
          name: "Fecha",
          formatter: (cell) =>
            cell !== "Sin Fecha" ? String(cell).substring(0, 10) : cell,
        },
      ],
      data: datosTabla,
      search: true,
      sort: true,
      pagination: { limit: 30 },
      language: {
        search: { placeholder: "Buscar en todo el listado..." },
        pagination: {
          previous: "Anterior",
          next: "Siguiente",
          showing: "Mostrando",
          results: () => "registros",
        },
      },
      style: { table: { "white-space": "nowrap" } },
    }).render(document.getElementById("contenedor-tabla"));
  }
</script>
