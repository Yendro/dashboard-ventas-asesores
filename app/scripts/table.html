<script>
  function renderizarTabla() {
    try {
      // 1. Obtener los valores actuales del calendario
      const fechaInicio = document.getElementById("fecha-inicio").value;
      const fechaFin = document.getElementById("fecha-fin").value;

      // 2. Filtrar los datos maestos estrictamente por FechaProceso
      const datosFiltradosTabla = DATOS_DESGLOSADOS.filter((fila) => {
        const fechaProceso = String(fila.FechaProceso || "").substring(0, 10);
        if (!fechaProceso) return false;

        if (fechaInicio && fechaProceso < fechaInicio) return false;
        if (fechaFin && fechaProceso > fechaFin) return false;

        return true;
      });

      // 3. Mapear los datos filtrados a la matriz requerida por DataTables
      const matrizTabla = datosFiltradosTabla.map((fila) => {
        const precioM2 = Number(fila.PrecioM2) || 0;
        const precioVenta = Number(fila.PrecioVenta || fila.f0_) || 0;
        const metros = Number(fila.M2 || 0);

        return [
          String(fila.Asesor || "Sin Asesor"),
          String(fila.Marca || "Sin Marca"),
          String(fila.Desarrollo || "Sin Desarrollo"),
          String(fila.Privada || "N/A"),
          String(fila.Etapa || "N/A"),
          String(fila.Unidad || "N/A"),
          String(fila.Modelo || "N/A"),
          metros.toFixed(2) + " m²",
          formateadorMoneda.format(precioM2),
          formateadorMoneda.format(precioVenta),
          String(fila.Cliente || "Sin Cliente"),
          String(fila.FechaProceso || "Sin Fecha").substring(0, 10),
          String(fila.FechaFinalizado || "Sin Fecha").substring(0, 10),
          String(fila.EstatusVenta || fila.Estatus || "Sin Estatus"),
        ];
      });

      // 4. Re-inyectar estructura HTML para limpieza profunda
      document.getElementById("contenedor-tabla").innerHTML = `
        <table id="miTablaDashboard" class="display nowrap">
          <thead>
            <tr>
              <th>Asesor</th><th>Marca</th><th>Desarrollo</th><th>Privada</th>
              <th>Etapa</th><th>Unidad</th><th>Modelo</th><th>M2</th>
              <th>Precio M2</th><th>Precio Venta</th><th>Cliente</th>
              <th>Fecha Proceso</th><th>Fecha Finalizado</th><th>Estatus</th>
            </tr>
          </thead>
        </table>
      `;

      // 5. Inicializar o Re-inicializar DataTables
      $("#miTablaDashboard").DataTable({
        data: matrizTabla,
        pageLength: 20,
        scrollX: true,
        language: {
          url: "https://cdn.datatables.net/plug-ins/1.13.7/i18n/es-ES.json",
        },
        destroy: true,
      });
    } catch (error) {
      console.error("Error al construir la tabla:", error);
      document.getElementById("contenedor-tabla").innerHTML =
        `<div style="color: #e74c3c; padding: 20px; font-weight: bold;">Error al procesar los datos de la tabla: ${error.message}</div>`;
    }
  }
</script>
