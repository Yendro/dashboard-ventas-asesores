<script>
  function renderizarTablaGridJs() {
    // Transformamos los objetos a un arreglo plano respetando todas las columnas del JSON
    const matrizTabla = DATOS_DESGLOSADOS.map((fila) => [
      String(fila.Asesor || "Sin Asesor"),
      String(fila.Marca || "Sin Marca"),
      String(fila.Desarrollo || "Sin Desarrollo"),
      String(fila.Privada || "N/A"),
      String(fila.Etapa || "N/A"),
      String(fila.Unidad || "N/A"),
      String(fila.Modelo || "N/A"),
      Number(fila.M2 || 0).toFixed(2), // Limpia los ceros extra de los decimales
      Number(fila.PrecioM2 || 0),
      Number(fila.PrecioVenta || fila.f0_ || 0),
      String(fila.Cliente || "Sin Cliente"),
      String(fila.FechaProceso || "Sin Fecha").substring(0, 10),
      String(fila.FechaFinalizado || "Sin Fecha").substring(0, 10),
      String(fila.EstatusVenta || fila.Estatus || "Sin Estatus"),
    ]);

    gridJsInstance = new gridjs.Grid({
      columns: [
        "Asesor",
        "Marca",
        "Desarrollo",
        "Privada",
        "Etapa",
        "Unidad",
        "Modelo",
        "M2",
        {
          name: "Precio M2",
          formatter: (cell) => formateadorMoneda.format(cell),
        },
        {
          name: "Precio Venta",
          formatter: (cell) => formateadorMoneda.format(cell),
        },
        "Cliente",
        "Fecha Proceso",
        "Fecha Finalizado",
        "Estatus Venta",
      ],
      data: matrizTabla,
      search: true,
      sort: true,
      pagination: { limit: 30 },
      language: {
        search: { placeholder: "Buscar en todo el listado..." },
        pagination: {
          previous: "Anterior",
          next: "Siguiente",
          showing: "Mostrando",
          results: () => "registros",
        },
      },
      style: { table: { "white-space": "nowrap" } },
    }).render(document.getElementById("contenedor-tabla"));
  }
</script>
