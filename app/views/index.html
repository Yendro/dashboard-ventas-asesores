    <style>
      .oculto {

      nav {
        display: flex;

      nav button {
        background-color: var(--card-bg);

      </h2>
    </div>

    <div id="pantalla-error" class="oculto">
      <h1 style="color: var(--accent); font-size: 4rem; margin: 0">!</h1>
      <h2 id="mensaje-error" style="color: var(--text-main)">

            <div class="chart-title">Ventas por mes</div>

          </div>

          </div>
          <div class="card chart-span-1">
            <div class="chart-title">Ventas por desarrollo</div>
            <div id="chart-desarrollo" class="echart-container"></div>
          </div>
          <div class="card chart-span-1">
            <div class="chart-title">Distribución por marca</div>
            <div id="chart-marcas" class="echart-container"></div>
