<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard de Ventas</title>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>

    <?!= HtmlService.createHtmlOutputFromFile('styles/dashboard').getContent();

  <body>
    <div id="app-container">
      <header>
        <div>
          <h1>Ventas por Asesores</h1>
          <span class="subtitle"
            >General: <span id="nombre-asesor"><?= asesor ?></span></span
          >
        </div>
        <div class="date-filters">
          <label>Fecha:</label>
          <input type="date" id="fecha-inicio" />
          <input type="date" id="fecha-fin" />
        </div>
      </header>

      <main class="dashboard-grid">
        <div class="card kpi">
          <div class="kpi-title">Ventas</div>
          <div class="kpi-value" id="kpi-ventas">$0</div>
        </div>
        <div class="card kpi">
          <div class="kpi-title">Unidades</div>
          <div class="kpi-value" id="kpi-unidades">0</div>
        </div>
        <div class="card kpi">
          <div class="kpi-title">Tubería</div>
          <div class="kpi-value" id="kpi-tuberia-val">$0</div>
        </div>
        <div class="card kpi">
          <div class="kpi-title">Unidades</div>
          <div class="kpi-value" id="kpi-tuberia-unidades">0</div>
        </div>

        <div class="card chart-span-2">
          <div class="chart-title">Ventas por mes</div>
          <div id="chart-ventas-meses" class="echart-container"></div>
        </div>
        <div class="card chart-span-2">
          <div class="chart-title">Desglose (Marca / Desarrollo)</div>
          <div id="chart-arbol" class="echart-container"></div>
        </div>

        <div class="card chart-span-1">
          <div class="chart-title">Ventas por desarrollo</div>
          <div id="chart-desarrollo" class="echart-container"></div>
        </div>
        <div class="card chart-span-1">
          <div class="chart-title">Distribución por marca</div>
          <div id="chart-marcas" class="echart-container"></div>
        </div>
        <div class="card chart-span-1">
          <div class="chart-title">Tubería por estatus</div>
          <div id="chart-estatus" class="echart-container"></div>
        </div>
        <div class="card chart-span-1">
          <div class="chart-title">Tubería por mes</div>
          <div id="chart-tuberia-meses" class="echart-container"></div>
        </div>
      </main>
    </div>

    <script>
      const ASESOR = "<?= asesor ?>";
      const DATOS_AGRUPADOS = <?!= datosAgrupados ?>;
    </script>

    <?!= HtmlService.createHtmlOutputFromFile('scripts/charts').getContent(); ?>

</html>
